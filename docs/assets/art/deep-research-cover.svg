<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Deep research cover: constellation of ideas forming a lightbulb">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0" stop-color="#2e1065"/>
      <stop offset="0.55" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ddd6fe" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <g opacity="0.5" fill="#e0e7ff">
    <circle cx="60" cy="70" r="1.3"/><circle cx="140" cy="330" r="1"/><circle cx="230" cy="90" r="1.6"/>
    <circle cx="320" cy="400" r="1.1"/><circle cx="520" cy="60" r="1.4"/><circle cx="640" cy="380" r="1.2"/>
    <circle cx="720" cy="120" r="1.7"/><circle cx="760" cy="300" r="1"/><circle cx="90" cy="220" r="1.2"/>
    <circle cx="440" cy="35" r="1"/><circle cx="680" cy="230" r="1.3"/><circle cx="180" cy="180" r="0.9"/>
  </g>
  <circle cx="400" cy="200" r="150" fill="url(#glow)" opacity="0.5"/>
  <!-- bulb outline as constellation -->
  <g stroke="url(#edge)" stroke-width="1.6" fill="none">
    <path d="M400 90 C 330 90 290 145 290 200 C 290 245 320 265 335 290 L 465 290 C 480 265 510 245 510 200 C 510 145 470 90 400 90 Z"/>
    <path d="M350 290 L 340 200 L 400 240 L 460 200 L 450 290"/>
    <path d="M360 315 L 440 315 M368 338 L 432 338"/>
  </g>
  <g fill="#f97316"><circle cx="400" cy="90" r="7"/></g>
  <g fill="#818cf8">
    <circle cx="290" cy="200" r="5.5"/><circle cx="510" cy="200" r="5.5"/>
  </g>
  <g fill="#34d399">
    <circle cx="340" cy="200" r="4.5"/><circle cx="460" cy="200" r="4.5"/><circle cx="400" cy="240" r="5"/>
  </g>
  <g fill="#22d3ee">
    <circle cx="335" cy="290" r="4"/><circle cx="465" cy="290" r="4"/>
  </g>
  <!-- satellite ideas linked to the bulb -->
  <g stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1.2">
    <line x1="290" y1="200" x2="150" y2="140"/><line x1="510" y1="200" x2="655" y2="150"/>
    <line x1="400" y1="90" x2="560" y2="55"/><line x1="335" y1="290" x2="185" y2="345"/>
    <line x1="465" y1="290" x2="625" y2="330"/>
  </g>
  <g>
    <circle cx="150" cy="140" r="6" fill="#f472b6"/><circle cx="655" cy="150" r="7" fill="#f97316"/>
    <circle cx="560" cy="55" r="5" fill="#34d399"/><circle cx="185" cy="345" r="6" fill="#818cf8"/>
    <circle cx="625" cy="330" r="5" fill="#22d3ee"/>
  </g>
</svg>
