<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Immersion: threads of light weaving ideas between books">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160f2e"/>
      <stop offset="0.5" stop-color="#251a4d"/>
      <stop offset="1" stop-color="#0c0a1a"/>
    </linearGradient>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f472b6"/><stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <!-- books on shelves, left and right -->
  <g>
    <g transform="translate(60,120)">
      <rect x="0" y="0" width="26" height="110" rx="3" fill="#4c1d95"/>
      <rect x="30" y="12" width="22" height="98" rx="3" fill="#5b21b6"/>
      <rect x="56" y="6" width="24" height="104" rx="3" fill="#7c3aed"/>
      <rect x="0" y="114" width="80" height="6" rx="3" fill="#2e1065"/>
    </g>
    <g transform="translate(650,220)">
      <rect x="0" y="8" width="24" height="100" rx="3" fill="#155e75"/>
      <rect x="28" y="0" width="26" height="108" rx="3" fill="#0e7490"/>
      <rect x="58" y="14" width="22" height="94" rx="3" fill="#164e63"/>
      <rect x="0" y="112" width="80" height="6" rx="3" fill="#083344"/>
    </g>
  </g>
  <!-- threads of light weaving between the shelves -->
  <g fill="none" stroke-width="2.2" stroke-linecap="round">
    <path d="M140 170 C 280 90 480 130 690 250" stroke="url(#t1)" stroke-opacity="0.85"/>
    <path d="M140 200 C 300 260 470 300 690 280" stroke="url(#t2)" stroke-opacity="0.8"/>
    <path d="M140 185 C 330 170 430 220 690 265" stroke="url(#t3)" stroke-opacity="0.7"/>
  </g>
  <!-- idea nodes strung on the threads -->
  <g>
    <circle cx="292" cy="117" r="7" fill="#f97316"/>
    <circle cx="452" cy="129" r="5.5" fill="#a78bfa"/>
    <circle cx="335" cy="272" r="6" fill="#34d399"/>
    <circle cx="530" cy="293" r="5" fill="#22d3ee"/>
    <circle cx="382" cy="186" r="6.5" fill="#f472b6"/>
    <circle cx="545" cy="230" r="5" fill="#818cf8"/>
  </g>
  <g fill="#ede9fe" opacity="0.6">
    <circle cx="200" cy="70" r="1.3"/><circle cx="360" cy="50" r="1"/><circle cx="560" cy="80" r="1.5"/>
    <circle cx="700" cy="140" r="1.1"/><circle cx="120" cy="330" r="1.2"/><circle cx="420" cy="380" r="1.3"/>
    <circle cx="600" cy="400" r="1"/><circle cx="740" cy="360" r="1.2"/>
  </g>
  <!-- soundwave hint along the bottom -->
  <g stroke="#a78bfa" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round">
    <line x1="330" y1="415" x2="330" y2="425"/><line x1="342" y1="408" x2="342" y2="432"/>
    <line x1="354" y1="400" x2="354" y2="440"/><line x1="366" y1="392" x2="366" y2="448"/>
    <line x1="378" y1="402" x2="378" y2="438"/><line x1="390" y1="410" x2="390" y2="430"/>
    <line x1="402" y1="396" x2="402" y2="444"/><line x1="414" y1="405" x2="414" y2="435"/>
    <line x1="426" y1="412" x2="426" y2="428"/><line x1="438" y1="404" x2="438" y2="436"/>
    <line x1="450" y1="414" x2="450" y2="426"/><line x1="462" y1="409" x2="462" y2="431"/>
    <line x1="474" y1="415" x2="474" y2="425"/>
  </g>
</svg>
