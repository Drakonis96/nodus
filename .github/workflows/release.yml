name: Release

# Builds the macOS .dmg and Windows .exe (NSIS) and attaches them to the GitHub
# Release for the pushed tag. Native modules (better-sqlite3, @napi-rs/canvas) are
# compiled on each OS runner — this is why a dmg cannot be built on Linux.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      # electron-builder creates the GitHub Release as part of publishing. Running
      # both OS jobs at once can race on release creation for the same tag.
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            platform: '--mac'
          - os: windows-latest
            platform: '--win'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      - name: Build and publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Configure these repository secrets to publish a notarized macOS
          # build. Without them electron-builder produces the explicit local
          # ad-hoc fallback, which macOS does not support for auto-update.
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: true
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder ${{ matrix.platform }} --publish always
