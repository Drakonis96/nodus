name: Release

# Builds the macOS .dmg, Windows .exe (NSIS) and Linux .deb/.AppImage and attaches
# them to the GitHub Release for the pushed tag. Native modules (better-sqlite3,
# @napi-rs/canvas) are compiled on each OS runner — this is why each installer must
# be built on its own OS. Linux ships deb + AppImage only: snap/flatpak need extra
# tooling (snapcraft, flatpak-builder + runtimes) that a bare ubuntu runner lacks.

on:
  push:
    tags:
      - 'v*'
  schedule:
    # One shared refresh per day. The generated JSON is served by GitHub Pages,
    # so visitors never fan out into individual GitHub API requests.
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  update-release-downloads:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh shared release download totals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/github-release-downloads.mjs

      - name: Publish the refreshed cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/github-release-downloads.json
          git diff --cached --quiet && exit 0
          git commit -m "Update GitHub release download totals"
          git push origin HEAD:main

      # GITHUB_TOKEN pushes intentionally do not trigger legacy Pages builds.
      # Request one explicitly so the refreshed /docs JSON reaches the CDN.
      - name: Refresh the GitHub Pages deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"

  release:
    if: github.event_name != 'schedule'
    env:
      HAS_MACOS_SIGNING: ${{ secrets.MACOS_CERTIFICATE != '' }}
    strategy:
      fail-fast: false
      # electron-builder creates a shared draft GitHub Release. Running the OS jobs
      # at once can race on creation for the same tag; the verification job below
      # promotes the draft only after every installer and updater manifest exists.
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            platform: '--mac'
          - os: windows-latest
            platform: '--win'
          - os: ubuntu-latest
            platform: '--linux'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      - name: Build and publish Windows installer
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.platform }} --publish always

      - name: Build and publish signed macOS installer
        if: matrix.os == 'macos-latest' && env.HAS_MACOS_SIGNING == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Configure these repository secrets to publish a notarized macOS
          # build. This path is selected only when the certificate exists.
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: true
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder ${{ matrix.platform }} --publish always

      - name: Build and publish ad-hoc macOS installer
        if: matrix.os == 'macos-latest' && env.HAS_MACOS_SIGNING != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The fallback keeps release production available while signing
          # credentials are being configured. It deliberately avoids passing an
          # empty CSC_LINK, which electron-builder treats as an invalid path.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder ${{ matrix.platform }} --publish always

      - name: Build and publish Linux installer
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.platform }} --publish always

  verify-release-assets:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify stable release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          for asset in \
            Nodus-mac-arm64.dmg \
            Nodus-win-x64.exe \
            Nodus-linux-amd64.deb \
            Nodus-linux-x86_64.AppImage \
            latest-mac.yml \
            latest.yml \
            latest-linux.yml
          do
            if ! grep -Fxq "$asset" <<< "$assets"; then
              echo "::error::Missing release asset: $asset"
              exit 1
            fi
          done

      - name: Publish completed release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest
