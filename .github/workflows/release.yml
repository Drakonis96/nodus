name: Release

# Builds the macOS .dmg, Windows .exe (NSIS) and Linux .deb/.AppImage and attaches
# them to the GitHub Release for the pushed tag. Native modules (better-sqlite3,
# @napi-rs/canvas) are compiled on each OS runner — this is why each installer must
# be built on its own OS. Linux ships deb + AppImage only: snap/flatpak need extra
# tooling (snapcraft, flatpak-builder + runtimes) that a bare ubuntu runner lacks.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    env:
      HAS_MACOS_SIGNING: ${{ secrets.MACOS_CERTIFICATE != '' }}
    strategy:
      fail-fast: false
      # electron-builder creates the GitHub Release as part of publishing. Running
      # both OS jobs at once can race on release creation for the same tag.
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            platform: '--mac'
          - os: windows-latest
            platform: '--win'
          - os: ubuntu-latest
            platform: '--linux'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      - name: Build and publish Windows installer
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.platform }} --publish always

      - name: Build and publish signed macOS installer
        if: matrix.os == 'macos-latest' && env.HAS_MACOS_SIGNING == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Configure these repository secrets to publish a notarized macOS
          # build. This path is selected only when the certificate exists.
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: true
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder ${{ matrix.platform }} --publish always

      - name: Build and publish ad-hoc macOS installer
        if: matrix.os == 'macos-latest' && env.HAS_MACOS_SIGNING != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The fallback keeps release production available while signing
          # credentials are being configured. It deliberately avoids passing an
          # empty CSC_LINK, which electron-builder treats as an invalid path.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder ${{ matrix.platform }} --publish always

      - name: Build and publish Linux installer
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.platform }} --publish always
