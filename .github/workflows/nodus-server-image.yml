name: Nodus Server image (experimental)

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'scripts/test-nodus-server.mjs'
      - 'scripts/test-nodus-server-deployment.mjs'
      - '.github/workflows/nodus-server-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: nodus-server-image-main
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/drakonis96/nodus-server

jobs:
  publish-main:
    # A manual run from another branch must never replace the image consumed by
    # production-like Portainer tests.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test server and deployment contract
        run: node --test scripts/test-nodus-server.mjs scripts/test-nodus-server-deployment.mjs

      - name: Build smoke-test image
        run: docker build --tag nodus-server:ci ./server

      - name: Run image health smoke test
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name nodus-server-ci \
            -p 127.0.0.1:17443:7443 \
            -e NODUS_PUBLIC_URL=http://localhost:17443 \
            -e NODUS_ADMIN_EMAIL=ci-admin@example.test \
            -e NODUS_ADMIN_PASSWORD=ci-only-admin-password-123456 \
            nodus-server:ci
          for _ in {1..30}; do
            if curl --fail --silent http://127.0.0.1:17443/healthz | grep --quiet '"ok":true'; then
              curl --silent --head http://127.0.0.1:17443/ | grep --ignore-case --quiet '^location: /login'
              docker rm -f nodus-server-ci >/dev/null
              exit 0
            fi
            sleep 1
          done
          docker logs nodus-server-ci
          docker rm -f nodus-server-ci >/dev/null
          exit 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=main
            type=sha,prefix=main-
          labels: |
            org.opencontainers.image.title=Nodus Server
            org.opencontainers.image.description=Experimental self-hosted Nodus MCP server
            org.opencontainers.image.source=https://github.com/Drakonis96/nodus
            org.opencontainers.image.revision=${{ github.sha }}
            app.nodus.stability=experimental

      - name: Publish experimental multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=nodus-server
          cache-to: type=gha,mode=max,scope=nodus-server

      - name: Verify Portainer can pull main anonymously
        shell: bash
        run: |
          set -euo pipefail
          docker logout ghcr.io
          manifest=''
          for _ in {1..10}; do
            if manifest="$(docker buildx imagetools inspect --raw "${IMAGE}:main" 2>/dev/null)"; then
              break
            fi
            sleep 3
          done
          test -n "$manifest"
          jq -e '
            [.manifests[].platform.architecture] as $architectures
            | ($architectures | index("amd64")) != null
              and ($architectures | index("arm64")) != null
          ' <<< "$manifest"
