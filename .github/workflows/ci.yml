name: CI

# Runs the full quality gate on every branch push and PR: typecheck + renderer
# and main builds, the 25-script unit/integration suite (Electron-as-Node, so
# better-sqlite3 matches the app ABI), and the e2e smoke that boots the real
# app. macOS runner: same platform as development, and Electron can open real
# windows there without xvfb.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (includes typecheck)
        run: npm run build

      - name: Unit and integration tests
        run: npm test

      - name: E2E smoke (real app boot)
        run: npm run test:e2e
