name: CI

# Runs the full quality gate on every branch push and PR: typecheck + renderer
# and main builds, the unit/integration suite (node --test discovers
# scripts/test-*.mjs and runs them in parallel; scripts that need better-sqlite3
# re-exec themselves under Electron-as-Node to match the app ABI), and the e2e
# smoke that boots the real app. macOS runner: same platform as development,
# and Electron can open real windows there without xvfb.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  # A branch push with an open PR emits both push and pull_request events. Use
  # the source branch for both so only one canonical run survives per commit.
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The test suite re-execs under Electron-as-Node, so native modules
      # (better-sqlite3) must match Electron's ABI, not the system Node's.
      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Lint
        run: npm run lint

      - name: Build (includes typecheck)
        run: npm run build

      - name: Unit and integration tests
        run: npm test

      - name: E2E smoke (real app boot)
        timeout-minutes: 10
        run: npm run test:e2e
