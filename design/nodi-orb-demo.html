<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nodi — diseño «Orbe» (prototipo)</title>
<style>
  /* ============================================================
     Nodi "Orbe" v3 — realista / astral + temas por vault
     Toda la familia "fría" del orbe deriva de un único tono
     base --h (el color del vault); los dorados son constantes.
     Autocontenido: SVG + CSS puros (portable a React/nodi.css).
     ============================================================ */
  :root {
    --gold: #e8c66a;
    --gold-bright: #ffe9a8;
    --ice: #dff1ff;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    font-family: -apple-system, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: #04060d;
    color: #cdd8ec;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---------- escenario ---------- */
  .stage {
    position: relative;
    width: 100%;
    max-width: 780px;
    height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 20px;
    margin-top: 16px;
    background:
      radial-gradient(ellipse 60% 45% at 50% 40%, rgba(43,70,140,.35) 0%, rgba(20,32,70,.18) 55%, transparent 100%),
      radial-gradient(ellipse 100% 80% at 50% 45%, #0b1330 0%, #070c1f 55%, #04060d 100%);
    overflow: hidden;
    transition: background .5s ease;
  }
  /* modo claro: estudio limpio, luz fría suave */
  .stage.light {
    background:
      radial-gradient(ellipse 70% 55% at 50% 34%, #ffffff 0%, rgba(255,255,255,0) 70%),
      linear-gradient(180deg, #fdfefe 0%, #f2f6fb 52%, #e3ebf5 100%);
  }
  /* campo de estrellas del escenario */
  .stage::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 11% 22%, rgba(225,238,255,.7) 50%, transparent 51%),
      radial-gradient(1.4px 1.4px at 79% 12%, rgba(225,238,255,.55) 50%, transparent 51%),
      radial-gradient(1px 1px at 88% 58%, rgba(225,238,255,.4) 50%, transparent 51%),
      radial-gradient(1px 1px at 28% 72%, rgba(225,238,255,.35) 50%, transparent 51%),
      radial-gradient(1.6px 1.6px at 62% 86%, rgba(225,238,255,.4) 50%, transparent 51%),
      radial-gradient(1px 1px at 44% 8%,  rgba(225,238,255,.6) 50%, transparent 51%),
      radial-gradient(1px 1px at 7% 55%,  rgba(225,238,255,.4) 50%, transparent 51%),
      radial-gradient(1.3px 1.3px at 93% 33%, rgba(225,238,255,.5) 50%, transparent 51%),
      radial-gradient(1px 1px at 53% 63%, rgba(225,238,255,.3) 50%, transparent 51%),
      radial-gradient(1px 1px at 18% 40%, rgba(225,238,255,.45) 50%, transparent 51%),
      radial-gradient(1.2px 1.2px at 70% 46%, rgba(225,238,255,.35) 50%, transparent 51%),
      radial-gradient(1px 1px at 36% 90%, rgba(225,238,255,.3) 50%, transparent 51%);
    pointer-events: none;
    transition: opacity .5s ease;
  }
  .stage.light::before { opacity: 0; }

  .statename {
    position: absolute; left: 0; right: 0; bottom: 14px;
    text-align: center; font-size: 13px; letter-spacing: .18em;
    text-transform: uppercase; color: rgba(190,210,240,.55);
    pointer-events: none;
  }
  .stage.light .statename { color: rgba(70,90,125,.65); }
  .statedesc {
    position: absolute; left: 0; right: 0; bottom: 32px;
    text-align: center; font-size: 12px; color: rgba(190,210,240,.35);
    pointer-events: none;
  }
  .stage.light .statedesc { color: rgba(70,90,125,.45); }

  /* ---------- controles ---------- */
  .controls {
    width: 100%; max-width: 780px;
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; padding: 16px 12px 4px;
  }
  .controls button {
    font: inherit; font-size: 13px;
    padding: 7px 14px; border-radius: 999px;
    border: 1px solid rgba(140,170,220,.25);
    background: rgba(20,30,55,.65); color: #cdd8ec;
    cursor: pointer; transition: all .15s ease;
  }
  .controls button:hover { border-color: rgba(160,200,255,.5); background: rgba(30,45,80,.8); }
  .controls button.on {
    background: rgba(90,150,255,.22); border-color: rgba(140,190,255,.8); color: #fff;
  }
  .controls button.toggle.on {
    background: rgba(232,198,106,.18); border-color: rgba(232,198,106,.7); color: var(--gold-bright);
  }

  /* ---------- selector de color de vault ---------- */
  .vaultbar {
    width: 100%; max-width: 780px;
    display: flex; flex-wrap: wrap; gap: 10px;
    align-items: center; justify-content: center;
    padding: 10px 12px 2px;
  }
  .vaultbar .lbl { font-size: 12px; color: rgba(190,210,240,.5); }
  .vaultbar button.sw {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.18);
    cursor: pointer; padding: 0;
    transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .vaultbar button.sw:hover { transform: scale(1.15); }
  .vaultbar button.sw.on {
    border-color: #fff;
    box-shadow: 0 0 0 2px rgba(255,255,255,.28);
    transform: scale(1.08);
  }
  .vaultbar .swname { font-size: 12px; color: rgba(220,232,250,.75); min-width: 92px; }

  .meta { display: flex; gap: 8px; padding: 8px 12px 24px; }
  .meta button {
    font: inherit; font-size: 12px; padding: 6px 12px; border-radius: 8px;
    border: 1px solid rgba(140,170,220,.2); background: transparent;
    color: rgba(190,210,240,.6); cursor: pointer;
  }
  .meta button:hover { color: #fff; border-color: rgba(160,200,255,.45); }
  h1 { font-size: 15px; font-weight: 600; letter-spacing: .04em; margin-top: 22px; color: #e6eefc; }
  h1 small { font-weight: 400; color: rgba(190,210,240,.45); margin-left: 8px; }

  /* ============================================================
     EL ORBE — tema de color
     Todo lo "frío" deriva de --h (tono del vault). Offsets en
     grados respecto a la familia azul original (base 210).
     ============================================================ */
  .orb {
    --h: 210deg;
    height: var(--size, 380px);
    width: auto;
    overflow: visible;
    display: block;
    user-select: none;
    --spd: 1; /* multiplicador global de velocidad por estado */
    isolation: isolate; /* los blend "screen" se quedan dentro del svg */
    transition: filter .8s ease;
  }
  .add { mix-blend-mode: screen; } /* capas de luz aditiva */

  /* — gradientes tematizados (stop-color vía CSS) — */
  .st-deep1 { stop-color: hsl(calc(var(--h) + 12deg) 58% 25%); }
  .st-deep2 { stop-color: hsl(calc(var(--h) + 16deg) 63% 17%); }
  .st-deep3 { stop-color: hsl(calc(var(--h) + 18deg) 67% 12%); }
  .st-deep4 { stop-color: hsl(calc(var(--h) + 19deg) 69% 9%); }
  .st-core1 { stop-color: hsl(calc(var(--h) - 6deg) 100% 96%); }
  .st-core2 { stop-color: hsl(calc(var(--h) - 6deg) 100% 81%); }
  .st-core3 { stop-color: hsl(var(--h) 74% 61%); }
  .st-halo1 { stop-color: hsl(calc(var(--h) + 7deg) 72% 56%); }
  .st-halo2 { stop-color: hsl(calc(var(--h) + 10deg) 64% 47%); }
  .st-bot1  { stop-color: hsl(calc(var(--h) - 20deg) 86% 59%); }
  .st-bot2  { stop-color: hsl(calc(var(--h) - 12deg) 66% 49%); }
  .st-rim2  { stop-color: hsl(calc(var(--h) + 3deg) 100% 81%); }
  .st-rim3  { stop-color: hsl(calc(var(--h) - 18deg) 88% 67%); }
  .st-satc1 { stop-color: hsl(calc(var(--h) - 16deg) 100% 92%); }
  .st-satc2 { stop-color: hsl(calc(var(--h) - 16deg) 79% 64%); }
  .st-satv1 { stop-color: hsl(calc(var(--h) + 48deg) 100% 92%); }
  .st-satv2 { stop-color: hsl(calc(var(--h) + 48deg) 89% 76%); }
  .st-ringc1 { stop-color: hsl(calc(var(--h) - 17deg) 92% 80%); }
  .st-ringc2 { stop-color: hsl(calc(var(--h) - 14deg) 56% 55%); }
  .st-ringc3 { stop-color: hsl(calc(var(--h) - 12deg) 52% 36%); }
  .st-load1 { stop-color: hsl(calc(var(--h) - 18deg) 89% 70%); }
  .st-load2 { stop-color: hsl(calc(var(--h) - 18deg) 100% 96%); }
  .st-ped1  { stop-color: hsl(calc(var(--h) - 17deg) 81% 57%); }
  .st-ped2  { stop-color: hsl(calc(var(--h) - 10deg) 66% 46%); }

  /* — elementos tematizados — */
  .neb-arm1  { stroke: hsl(calc(var(--h) + 7deg) 72% 56%); }
  .neb-arm1b { stroke: hsl(calc(var(--h) - 21deg) 73% 53%); }
  .neb-arm2  { stroke: hsl(calc(var(--h) + 48deg) 75% 65%); }
  .neb-cloud { fill:   hsl(calc(var(--h) + 12deg) 63% 44%); }
  .mln       { stroke: hsl(calc(var(--h) - 2deg) 100% 81%); }
  .n-c       { fill:   hsl(calc(var(--h) - 16deg) 88% 71%); }
  .n-v       { fill:   hsl(calc(var(--h) + 48deg) 90% 76%); }
  .n-g       { fill:   var(--gold-bright); }
  .flare-el  { fill:   hsl(calc(var(--h) - 6deg) 100% 94%); }
  .core-mid  { fill:   hsl(calc(var(--h) - 6deg) 100% 87%); }
  .rim-glow-in  { stroke: hsl(calc(var(--h) - 4deg) 100% 77% / .28); }
  .rim-glow-out { stroke: hsl(calc(var(--h) - 2deg) 100% 74% / .3); }
  .rim-bounce   { fill:   hsl(calc(var(--h) - 8deg) 100% 81% / .28); }
  .rim-base-arc { stroke: hsl(calc(var(--h) - 18deg) 89% 70% / .5); }
  .ped-ln1 { stroke: hsl(calc(var(--h) - 18deg) 89% 70% / .35); }
  .ped-ln2 { stroke: hsl(calc(var(--h) - 14deg) 100% 83% / .3); }
  .think-ring { stroke: hsl(calc(var(--h) + 3deg) 100% 89% / .45); }
  .load-track { stroke: hsl(calc(var(--h) - 18deg) 89% 70% / .13); }
  .load-arc-glow { stroke: hsl(calc(var(--h) - 18deg) 89% 70% / .5); }
  .link-base  { stroke: hsl(calc(var(--h) - 18deg) 89% 70% / .18); }
  .link-pulse { stroke: hsl(calc(var(--h) - 14deg) 91% 87%); }
  .link-node  { fill:   hsl(calc(var(--h) - 16deg) 100% 92%); }
  .rgB { stroke: hsl(calc(var(--h) - 16deg) 80% 66% / .3); }

  /* — partículas de celebración (color + su propio resplandor) — */
  .pc0 { fill: var(--gold-bright); color: var(--gold-bright); }
  .pc1 { fill: hsl(calc(var(--h) - 16deg) 88% 71%); color: hsl(calc(var(--h) - 16deg) 88% 71%); }
  .pc2 { fill: hsl(calc(var(--h) + 48deg) 90% 76%); color: hsl(calc(var(--h) + 48deg) 90% 76%); }
  .pc3 { fill: var(--ice); color: var(--ice); }
  .pc4 { fill: var(--gold); color: var(--gold); }
  .pc5 { fill: hsl(calc(var(--h) - 40deg) 80% 70%); color: hsl(calc(var(--h) - 40deg) 80% 70%); }
  .party { filter: drop-shadow(0 0 4px currentColor); }

  .orb .float {
    animation: orb-float 7s ease-in-out infinite;
    transform-box: view-box; transform-origin: 160px 160px;
  }
  @keyframes orb-float {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-7px); }
  }

  /* ---------- pedestal: brillo (oscuro) / sombra de contacto (claro) ---------- */
  .orb .ped-glow   { transition: opacity .5s ease; }
  .orb .ped-shadow { transition: opacity .5s ease; opacity: 0; }
  .stage.light .orb .ped-glow   { opacity: .25; }
  .stage.light .orb .ped-shadow { opacity: 1; }
  .orb .ped-pulse { transform-box: view-box; transform-origin: 160px 298px; animation: ped-pulse 4.6s ease-in-out infinite; }
  @keyframes ped-pulse {
    0%,100% { opacity: .5; transform: scaleX(1); }
    50%     { opacity: .95; transform: scaleX(1.06); }
  }

  /* ---------- halo exterior ---------- */
  .orb .halo { animation: halo-breathe 7s ease-in-out infinite; transform-box: view-box; transform-origin: 160px 160px; }
  @keyframes halo-breathe {
    0%,100% { opacity: .75; transform: scale(1); }
    50%     { opacity: 1;   transform: scale(1.04); }
  }

  /* ---------- anillos orbitales ---------- */
  .orb .ring { fill: none; transition: opacity .5s ease, stroke .5s ease, stroke-width .5s ease; }
  /* modo claro: los anillos ganan cuerpo — línea más oscura y gruesa,
     y el glow pasa a blending normal para que no desaparezca sobre blanco */
  .stage.light .orb .ring-glow { mix-blend-mode: normal; opacity: .55; }
  .stage.light .orb .ring-gold-line { stroke: rgba(158,113,28,.85); stroke-width: 1.5; }
  .stage.light .orb .ring-cyan-line { stroke: hsl(calc(var(--h) - 14deg) 55% 40% / .8); stroke-width: 1.3; }
  .stage.light .orb .ring-dim-line  { stroke: rgba(158,124,52,.6); stroke-width: 1.1; opacity: 1; }

  /* ---------- satélites (grupo halo+núcleo sobre offset-path) ---------- */
  .orb .sat {
    offset-rotate: 0deg;
    animation:
      sat-orbit calc(var(--dur) * var(--spd)) linear infinite,
      sat-depth calc(var(--dur) * var(--spd)) linear infinite;
    animation-delay: var(--delay, 0s), var(--delay, 0s);
  }
  @keyframes sat-orbit { from { offset-distance: 0%; } to { offset-distance: 100%; } }
  /* primera mitad del trazado = cara cercana (brillante); segunda = lejana */
  @keyframes sat-depth {
    0%   { opacity: .95; }
    25%  { opacity: 1;   }
    50%  { opacity: .55; }
    75%  { opacity: .35; }
    100% { opacity: .95; }
  }

  /* ---------- giro interior ---------- */
  .orb .neb-spin {
    animation: neb-rot calc(46s * var(--spd)) linear infinite;
    transform-box: view-box; transform-origin: 160px 160px;
  }
  .orb .neb-spin2 {
    animation: neb-rot calc(64s * var(--spd)) linear infinite reverse;
    transform-box: view-box; transform-origin: 160px 160px;
  }
  @keyframes neb-rot { to { transform: rotate(360deg); } }
  .orb .mesh {
    animation: neb-rot calc(75s * var(--spd)) linear infinite reverse;
    transform-box: view-box; transform-origin: 160px 160px;
  }
  .orb .tw { animation: node-tw 3.8s ease-in-out infinite; }
  @keyframes node-tw {
    0%,100% { opacity: .3; }
    50%     { opacity: 1; }
  }
  .orb .accent { transform-box: fill-box; transform-origin: center; animation: accent-glow 3.2s ease-in-out infinite; }
  @keyframes accent-glow {
    0%,100% { transform: scale(1);   opacity: .75; }
    50%     { transform: scale(1.3); opacity: 1;   }
  }
  .orb .star-tw { animation: star-tw 4.5s ease-in-out infinite; }
  @keyframes star-tw {
    0%,100% { opacity: .25; }
    50%     { opacity: .9; }
  }

  /* ---------- núcleo ---------- */
  .orb .core {
    transform-box: view-box; transform-origin: 160px 160px;
    animation: core-pulse 5s ease-in-out infinite;
  }
  @keyframes core-pulse {
    0%,100% { transform: scale(1);    opacity: .92; }
    50%     { transform: scale(1.1);  opacity: 1;   }
  }
  .orb .flare {
    transform-box: view-box; transform-origin: 160px 160px;
    animation: flare-pulse 5s ease-in-out infinite;
  }
  @keyframes flare-pulse {
    0%,100% { opacity: .55; transform: scale(.94); }
    50%     { opacity: .95; transform: scale(1.06); }
  }

  /* ---------- polvo dorado flotante ---------- */
  .orb .dust { animation: dust-tw 5s ease-in-out infinite; }
  @keyframes dust-tw {
    0%,100% { opacity: .1; }
    50%     { opacity: .8; }
  }

  /* ============================================================
     CAPAS DE ESTADO
     ============================================================ */
  .orb .fx { opacity: 0; visibility: hidden; transition: opacity .35s ease, visibility 0s linear .35s; }
  .orb[data-state="loading"]     .fx-loading,
  .orb[data-state="thinking"]    .fx-thinking,
  .orb[data-state="connecting"]  .fx-connecting,
  .orb[data-state="discovering"] .fx-discovering,
  .orb[data-state="success"]     .fx-success,
  .orb[data-state="celebrating"] .fx-celebrating,
  .orb[data-state="sleeping"]    .fx-sleeping,
  .orb.notify                    .fx-notify {
    opacity: 1; visibility: visible; transition-delay: 0s;
  }

  /* ---------- PENSANDO ---------- */
  .orb[data-state="thinking"] { --spd: .6; }
  .orb[data-state="thinking"] .core  { animation-duration: 1.6s; }
  .orb[data-state="thinking"] .flare { animation-duration: 1.6s; }
  .orb[data-state="thinking"] .tw    { animation-duration: 1.2s; }
  .orb .think-ring {
    fill: none; stroke-width: 1;
    stroke-dasharray: 3 10; stroke-linecap: round;
  }
  .orb .fx-thinking { transform-box: view-box; transform-origin: 160px 160px; }
  .orb[data-state="thinking"] .fx-thinking { animation: think-rot 6s linear infinite; }
  @keyframes think-rot { to { transform: rotate(360deg); } }

  /* ---------- CARGANDO ---------- */
  .orb[data-state="loading"] { --spd: .5; }
  .orb .load-group { transform-box: view-box; transform-origin: 160px 160px; }
  .orb[data-state="loading"] .load-group { animation: load-sweep 1.35s linear infinite; }
  @keyframes load-sweep { to { transform: rotate(360deg); } }
  .orb .load-track { fill: none; stroke-width: 4; }
  .orb .load-arc {
    fill: none; stroke: url(#loadGrad); stroke-width: 4; stroke-linecap: round;
    stroke-dasharray: 168 452;
  }
  .orb .load-arc-glow {
    fill: none; stroke-width: 9; stroke-linecap: round;
    stroke-dasharray: 168 452; filter: url(#b6);
  }
  .orb .load-head { fill: #fff; filter: url(#b2); }

  /* ---------- NOTIFICACIÓN ---------- */
  .orb .noti-star {
    transform-box: fill-box; transform-origin: center;
    fill: var(--gold-bright);
  }
  .orb .noti-halo { transform-box: fill-box; transform-origin: center; }
  .orb.notify .noti-star { animation: noti-flash .95s ease-in-out infinite; }
  .orb.notify .noti-halo { animation: noti-flash .95s ease-in-out infinite; }
  @keyframes noti-flash {
    0%,100% { transform: scale(.85) ; opacity: .85; }
    50%     { transform: scale(1.18); opacity: 1; }
  }
  .orb .noti-ripple {
    fill: none; stroke: rgba(255,225,140,.75); stroke-width: 1.3;
    transform-box: fill-box; transform-origin: center;
  }
  .orb.notify .noti-ripple { animation: noti-ripple 1.9s ease-out infinite; }
  @keyframes noti-ripple {
    0%   { transform: scale(.3); opacity: .9; }
    70%  { transform: scale(1.7); opacity: 0; }
    100% { transform: scale(1.7); opacity: 0; }
  }
  .orb.notify .core { animation-duration: 1s; }

  /* ---------- CONECTANDO ---------- */
  .orb .link-base { fill: none; stroke-width: 1.1; stroke-linecap: round; }
  .orb .link-pulse {
    fill: none; stroke-width: 1.7; stroke-linecap: round;
    stroke-dasharray: 14 240;
    filter: url(#b2);
  }
  .orb[data-state="connecting"] .link-pulse  { animation: link-travel 1.5s linear infinite; }
  .orb[data-state="connecting"] .link-pulse.p2 { animation-delay: .5s; }
  .orb[data-state="connecting"] .link-pulse.p3 { animation-delay: .9s; }
  @keyframes link-travel { from { stroke-dashoffset: 254; } to { stroke-dashoffset: 0; } }
  .orb .link-node { filter: url(#b2); transform-box: fill-box; transform-origin: center; }
  .orb[data-state="connecting"] .link-node { animation: accent-glow 1.5s ease-in-out infinite; }

  /* ---------- DESCUBRIENDO ---------- */
  .orb .spk {
    transform-box: fill-box; transform-origin: center;
    fill: var(--gold-bright);
    filter: url(#b1);
    opacity: 0;
  }
  .orb[data-state="discovering"] .spk  { animation: spark-pop 2.2s ease-in-out infinite; }
  .orb[data-state="discovering"] .spk.s2 { animation-delay: .55s; }
  .orb[data-state="discovering"] .spk.s3 { animation-delay: 1.1s; }
  .orb[data-state="discovering"] .spk.s4 { animation-delay: 1.65s; }
  @keyframes spark-pop {
    0%, 100% { opacity: 0; transform: scale(.2) rotate(0deg); }
    12%      { opacity: 1; transform: scale(1.15) rotate(18deg); }
    30%      { opacity: .9; transform: scale(.9) rotate(28deg); }
    48%      { opacity: 0; transform: scale(.3) rotate(40deg); }
  }
  .orb[data-state="discovering"] { --spd: .8; }
  .orb[data-state="discovering"] .tw { animation-duration: 1.6s; }

  /* ---------- SALUDANDO ---------- */
  .orb[data-state="waving"] .float { animation: orb-rock 2.1s ease-in-out infinite; }
  @keyframes orb-rock {
    0%,100% { transform: translateY(0) rotate(-4.5deg); }
    50%     { transform: translateY(-6px) rotate(4.5deg); }
  }
  .orb .shimmer { opacity: 0; }
  .orb[data-state="waving"] .shimmer { opacity: 1; animation: shimmer-sweep 2.1s ease-in-out infinite; }
  @keyframes shimmer-sweep {
    0%   { transform: translateX(-135px) skewX(-18deg); }
    60%, 100% { transform: translateX(215px) skewX(-18deg); }
  }

  /* ---------- ÉXITO ---------- */
  .orb .sphere-tint { transition: opacity .6s ease; opacity: 0; }
  .orb[data-state="success"] .sphere-tint.tint-green { opacity: .9; }
  .orb .succ-ring {
    fill: none; stroke: rgba(140,240,200,.65); stroke-width: 1.3;
    transform-box: view-box; transform-origin: 160px 160px;
    filter: url(#b1);
  }
  .orb[data-state="success"] .succ-ring    { animation: succ-expand 2.4s ease-out infinite; }
  .orb[data-state="success"] .succ-ring.r2 { animation-delay: .8s; stroke: rgba(255,225,140,.55); }
  @keyframes succ-expand {
    0%   { transform: scale(.92); opacity: 0; }
    15%  { opacity: .85; }
    75%  { transform: scale(1.45); opacity: 0; }
    100% { transform: scale(1.45); opacity: 0; }
  }
  .orb .succ-star {
    transform-box: fill-box; transform-origin: center;
    fill: var(--gold-bright);
    filter: url(#b1);
  }
  .orb[data-state="success"] .succ-star { animation: succ-rise 2.4s ease-out infinite; }
  @keyframes succ-rise {
    0%   { transform: translateY(26px) scale(.4); opacity: 0; }
    22%  { opacity: 1; }
    55%  { transform: translateY(-14px) scale(1.15); opacity: 1; }
    85%  { transform: translateY(-30px) scale(.8); opacity: 0; }
    100% { transform: translateY(-30px) scale(.8); opacity: 0; }
  }
  .orb .succ-beam { fill: none; stroke: url(#beamGrad); stroke-width: 2.4; stroke-linecap: round; filter: url(#b2); }
  .orb[data-state="success"] .succ-beam { animation: succ-beam 2.4s ease-out infinite; }
  @keyframes succ-beam {
    0% { opacity: 0; } 25% { opacity: .95; } 70% { opacity: 0; } 100% { opacity: 0; }
  }
  .orb[data-state="success"] { --spd: .7; }
  .orb[data-state="success"] .core { animation-duration: 2.4s; }
  .orb[data-state="success"] .ring-gold-line { stroke: rgba(255,228,150,.95); }

  /* ---------- CELEBRACIÓN ---------- */
  .orb[data-state="celebrating"] { --spd: .38; }
  .orb .party { transform-box: fill-box; transform-origin: center; opacity: 0; }
  .orb[data-state="celebrating"] .party {
    animation: party-burst 1.7s cubic-bezier(.15,.6,.4,1) infinite;
    animation-delay: var(--pd, 0s);
  }
  @keyframes party-burst {
    0%   { opacity: 0; transform: translate(0,0) scale(.3) rotate(0deg); }
    10%  { opacity: 1; }
    70%  { opacity: .9; }
    100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(1) rotate(90deg); }
  }
  .orb[data-state="celebrating"] .core { animation: core-party .85s ease-in-out infinite; }
  @keyframes core-party {
    0%,100% { transform: scale(1);    opacity: .95; }
    50%     { transform: scale(1.2);  opacity: 1;   }
  }
  .orb[data-state="celebrating"] .ring-gold-line { stroke: rgba(255,228,150,1); }
  .orb[data-state="celebrating"] .ring-cyan-line { stroke: hsl(calc(var(--h) - 16deg) 85% 74% / .8); }

  /* ---------- DURMIENDO ---------- */
  .orb[data-state="sleeping"] { --spd: 3.4; filter: brightness(.62) saturate(.8); }
  .orb[data-state="sleeping"] .core  { animation: core-breathe 5.5s ease-in-out infinite; }
  .orb[data-state="sleeping"] .flare { animation: none; opacity: .3; }
  @keyframes core-breathe {
    0%,100% { transform: scale(.94); opacity: .6; }
    50%     { transform: scale(1.02); opacity: .85; }
  }
  .orb[data-state="sleeping"] .ped-glow { opacity: .35; }
  .orb .moon { fill: rgba(232,198,106,.85); transform-box: fill-box; transform-origin: center; filter: url(#b1); }
  .orb[data-state="sleeping"] .moon { animation: moon-glow 5.5s ease-in-out infinite; }
  @keyframes moon-glow {
    0%,100% { opacity: .4; transform: translateY(0); }
    50%     { opacity: .85; transform: translateY(-3px); }
  }

  /* ---------- CERRANDO ---------- */
  .orb[data-state="closing"] { pointer-events: none; }
  .orb[data-state="closing"] .float { animation: close-core 1.6s cubic-bezier(.3,.7,.3,1) both; }
  @keyframes close-core {
    0%   { transform: scale(1); opacity: 1; }
    38%  { transform: scale(1.07); opacity: 1; }
    100% { transform: scale(.02); opacity: 0; }
  }
  .orb .close-flash {
    fill: none; stroke: rgba(200,230,255,.9); stroke-width: 2;
    transform-box: view-box; transform-origin: 160px 160px;
    opacity: 0; filter: url(#b1);
  }
  .orb[data-state="closing"] .close-flash  { animation: close-ring 1.1s ease-out .3s both; }
  .orb[data-state="closing"] .close-flash.c2 { animation-delay: .45s; stroke: rgba(232,198,106,.8); }
  @keyframes close-ring {
    0%   { transform: scale(.6); opacity: 0; }
    20%  { opacity: .95; }
    100% { transform: scale(1.9); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .orb *, .orb { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
  }
</style>
</head>
<body>
  <h1>Nodi · diseño «Orbe» <small>prototipo de animaciones — no integrado aún</small></h1>

  <div class="stage" id="stage">
    <svg class="orb" id="orb" viewBox="0 0 320 340" data-state="idle" role="img" aria-label="Nodi orbe">
      <defs>
        <!-- ===== filtros de desenfoque (bloom) ===== -->
        <filter id="b1"  x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="1.2" /></filter>
        <filter id="b2"  x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2.2" /></filter>
        <filter id="b4"  x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" /></filter>
        <filter id="b6"  x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="6" /></filter>
        <filter id="b10" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="10" /></filter>
        <filter id="b14" x="-160%" y="-160%" width="420%" height="420%"><feGaussianBlur stdDeviation="14" /></filter>

        <!-- ===== textura de nubes (turbulencia); el tinte lo ajusta JS al tema ===== -->
        <filter id="clouds" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="4" seed="11" result="n" />
          <feColorMatrix id="cloudTint" in="n" type="matrix"
            values="0 0 0 0 0.45
                    0 0 0 0 0.62
                    0 0 0 0 1
                    0.35 0.35 0.35 0 -0.18" />
        </filter>

        <!-- ===== gradientes (stop-color tematizado vía CSS) ===== -->
        <radialGradient id="deepSpace" cx="42%" cy="36%" r="85%">
          <stop offset="0%"  class="st-deep1" />
          <stop offset="45%" class="st-deep2" />
          <stop offset="80%" class="st-deep3" />
          <stop offset="100%" class="st-deep4" />
        </radialGradient>
        <radialGradient id="vignette" cx="42%" cy="36%" r="72%">
          <stop offset="0%"  stop-color="#000000" stop-opacity="0" />
          <stop offset="72%" stop-color="#000208" stop-opacity="0" />
          <stop offset="100%" stop-color="#000208" stop-opacity=".55" />
        </radialGradient>
        <radialGradient id="coreBloomG" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  class="st-core1" stop-opacity=".95" />
          <stop offset="30%" class="st-core2" stop-opacity=".5" />
          <stop offset="65%" class="st-core3" stop-opacity=".16" />
          <stop offset="100%" class="st-core3" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="haloG" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  class="st-halo1" stop-opacity=".32" />
          <stop offset="55%" class="st-halo2" stop-opacity=".14" />
          <stop offset="100%" class="st-halo2" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="bottomGlow" cx="50%" cy="100%" r="90%">
          <stop offset="0%"  class="st-bot1" stop-opacity=".4" />
          <stop offset="45%" class="st-bot2" stop-opacity=".12" />
          <stop offset="100%" class="st-bot2" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="tintGreen" cx="50%" cy="55%" r="55%">
          <stop offset="0%"  stop-color="#4be3a4" stop-opacity=".5" />
          <stop offset="70%" stop-color="#2bbf8a" stop-opacity=".18" />
          <stop offset="100%" stop-color="#2bbf8a" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="pedGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  class="st-ped1" stop-opacity=".4" />
          <stop offset="60%" class="st-ped2" stop-opacity=".14" />
          <stop offset="100%" class="st-ped2" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="pedShadowG" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#26314a" stop-opacity=".38" />
          <stop offset="70%" stop-color="#26314a" stop-opacity=".12" />
          <stop offset="100%" stop-color="#26314a" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="satHaloGold" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffe9a8" stop-opacity=".9" />
          <stop offset="40%" stop-color="#f7c95e" stop-opacity=".35" />
          <stop offset="100%" stop-color="#f7c95e" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="satHaloCyan" cx="50%" cy="50%" r="50%">
          <stop offset="0%" class="st-satc1" stop-opacity=".9" />
          <stop offset="40%" class="st-satc2" stop-opacity=".35" />
          <stop offset="100%" class="st-satc2" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="satHaloViolet" cx="50%" cy="50%" r="50%">
          <stop offset="0%" class="st-satv1" stop-opacity=".9" />
          <stop offset="40%" class="st-satv2" stop-opacity=".35" />
          <stop offset="100%" class="st-satv2" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="ringGoldG" x1="0%" y1="0%" x2="100%" y2="70%">
          <stop offset="0%"   stop-color="#ffe9a8" stop-opacity=".95" />
          <stop offset="45%"  stop-color="#c99b3f" stop-opacity=".55" />
          <stop offset="100%" stop-color="#8a6a2a" stop-opacity=".26" />
        </linearGradient>
        <linearGradient id="ringCyanG" x1="100%" y1="0%" x2="0%" y2="70%">
          <stop offset="0%"   class="st-ringc1" stop-opacity=".75" />
          <stop offset="55%"  class="st-ringc2" stop-opacity=".35" />
          <stop offset="100%" class="st-ringc3" stop-opacity=".15" />
        </linearGradient>
        <linearGradient id="loadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   class="st-load1" stop-opacity="0" />
          <stop offset="55%"  class="st-load1" stop-opacity=".85" />
          <stop offset="100%" class="st-load2" />
        </linearGradient>
        <linearGradient id="beamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%"   stop-color="#ffe9a8" stop-opacity="0" />
          <stop offset="60%"  stop-color="#ffe9a8" stop-opacity=".8" />
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="shimmerG" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity="0" />
          <stop offset="50%"  stop-color="#ffffff" stop-opacity=".2" />
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="rimFresnel" x1="0%" y1="0%" x2="35%" y2="100%">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity=".85" />
          <stop offset="45%"  class="st-rim2" stop-opacity=".3" />
          <stop offset="100%" class="st-rim3" stop-opacity=".55" />
        </linearGradient>

        <clipPath id="sphereClip"><circle cx="160" cy="160" r="79" /></clipPath>
        <path id="star4" d="M0,-16 C1.4,-5.5 5.5,-1.4 16,0 C5.5,1.4 1.4,5.5 0,16 C-1.4,5.5 -5.5,1.4 -16,0 C-5.5,-1.4 -1.4,-5.5 0,-16 Z" />
      </defs>

      <g class="float">

        <!-- ═══ halo exterior ═══ -->
        <circle class="halo add" cx="160" cy="160" r="132" fill="url(#haloG)" />

        <!-- ═══ pedestal ═══ -->
        <g class="ped-glow">
          <ellipse cx="160" cy="297" rx="98" ry="17" fill="url(#pedGlow)" class="add" />
          <ellipse class="ped-pulse ped-ln1" cx="160" cy="297" rx="80" ry="12" fill="none" stroke-width="1.2" filter="url(#b1)" />
          <ellipse class="ped-ln2" cx="160" cy="299" rx="48" ry="7" fill="none" stroke-width="1" filter="url(#b1)" />
        </g>
        <g class="ped-shadow">
          <ellipse cx="160" cy="292" rx="72" ry="13" fill="url(#pedShadowG)" />
        </g>

        <!-- ═══ anillos orbitales: subcapa difusa + línea nítida ═══ -->
        <g transform="rotate(-16 160 160)">
          <ellipse class="ring ring-glow add" cx="160" cy="160" rx="130" ry="42" stroke="rgba(232,198,106,.35)" stroke-width="3.2" filter="url(#b4)" fill="none" />
          <ellipse class="ring ring-gold-line" cx="160" cy="160" rx="130" ry="42" stroke="url(#ringGoldG)" stroke-width="1.1" fill="none" />
        </g>
        <g transform="rotate(22 160 160)">
          <ellipse class="ring ring-glow rgB add" cx="160" cy="160" rx="118" ry="54" stroke-width="2.6" filter="url(#b4)" fill="none" />
          <ellipse class="ring ring-cyan-line" cx="160" cy="160" rx="118" ry="54" stroke="url(#ringCyanG)" stroke-width=".9" fill="none" />
        </g>
        <g transform="rotate(-38 160 160)">
          <ellipse class="ring ring-glow add" cx="160" cy="160" rx="142" ry="30" stroke="rgba(220,210,190,.16)" stroke-width="2.2" filter="url(#b4)" fill="none" />
          <ellipse class="ring ring-dim-line" cx="160" cy="160" rx="142" ry="30" stroke="url(#ringGoldG)" stroke-width=".7" opacity=".55" fill="none" />
        </g>

        <!-- ═══ polvo dorado flotante (generado por JS) ═══ -->
        <g id="dustLayer"></g>

        <!-- ═══ LA ESFERA ═══ -->
        <g>
          <!-- interior: galaxia opaca (como las láminas: no es transparente) -->
          <circle cx="160" cy="160" r="79" fill="url(#deepSpace)" />

          <g clip-path="url(#sphereClip)">
            <!-- nubes de turbulencia (textura fina) -->
            <circle cx="160" cy="160" r="79" filter="url(#clouds)" opacity=".5" class="add" />

            <!-- brazos de nebulosa: trazos anchos muy difuminados, luz aditiva -->
            <g class="neb-spin">
              <ellipse class="neb-arm1 add" cx="160" cy="160" rx="52" ry="20" fill="none" stroke-width="16"
                       transform="rotate(28 160 160)" filter="url(#b10)" opacity=".6" />
              <ellipse class="neb-arm1b add" cx="164" cy="156" rx="60" ry="13" fill="none" stroke-width="9"
                       transform="rotate(6 160 160)" filter="url(#b10)" opacity=".38" />
            </g>
            <g class="neb-spin2">
              <ellipse class="neb-arm2 add" cx="156" cy="164" rx="42" ry="26" fill="none" stroke-width="13"
                       transform="rotate(-22 160 160)" filter="url(#b14)" opacity=".42" />
              <circle class="neb-cloud add" cx="150" cy="150" r="30" filter="url(#b14)" opacity=".5" />
            </g>

            <!-- campo de estrellas interior (generado por JS) -->
            <g id="starfield"></g>

            <!-- constelación (generada por JS) -->
            <g class="mesh" id="mesh"></g>

            <!-- luz rebotando en el fondo del cristal -->
            <circle cx="160" cy="160" r="79" fill="url(#bottomGlow)" class="add" />

            <!-- tinte de estado (éxito) -->
            <circle class="sphere-tint tint-green add" cx="160" cy="160" r="79" fill="url(#tintGreen)" />

            <!-- enlaces de "conectando" -->
            <g class="fx fx-connecting">
              <path class="link-base"  d="M112,186 L150,128 L206,152 L176,196" />
              <path class="link-pulse" d="M112,186 L150,128 L206,152 L176,196" />
              <path class="link-base"  d="M122,120 L168,172 L214,122" />
              <path class="link-pulse p2" d="M122,120 L168,172 L214,122" />
              <path class="link-base"  d="M104,150 L160,160 L212,180" />
              <path class="link-pulse p3" d="M104,150 L160,160 L212,180" />
              <circle class="link-node" cx="150" cy="128" r="3.2" />
              <circle class="link-node" cx="206" cy="152" r="2.8" />
              <circle class="link-node" cx="168" cy="172" r="2.8" />
            </g>

            <!-- núcleo: bloom multicapa + lens flare -->
            <g class="core">
              <circle cx="160" cy="160" r="46" fill="url(#coreBloomG)" class="add" opacity=".8" />
              <circle class="core-mid add" cx="160" cy="160" r="18" filter="url(#b6)" opacity=".8" />
              <circle cx="160" cy="160" r="5.5" fill="#ffffff" filter="url(#b1)" />
              <circle cx="160" cy="160" r="2.6" fill="#ffffff" />
            </g>
            <g class="flare add">
              <ellipse class="flare-el" cx="160" cy="160" rx="1.6" ry="34" filter="url(#b2)" />
              <ellipse class="flare-el" cx="160" cy="160" rx="26" ry="1.4" filter="url(#b2)" />
              <ellipse cx="160" cy="160" rx="1" ry="14" fill="#ffffff" transform="rotate(45 160 160)" filter="url(#b2)" opacity=".6" />
            </g>

            <!-- reflejo que barre el cristal (saludando) -->
            <rect class="shimmer" x="118" y="68" width="48" height="188" fill="url(#shimmerG)" />

            <!-- sombreado esférico: viñeta hacia el borde -->
            <circle cx="160" cy="160" r="79" fill="url(#vignette)" />
          </g>

          <!-- ── cáscara de cristal ── -->
          <circle class="rim-glow-in add" cx="160" cy="160" r="76.5" fill="none" stroke-width="4" filter="url(#b4)" />
          <circle cx="160" cy="160" r="79" fill="none" stroke="url(#rimFresnel)" stroke-width="1.5" />
          <circle class="rim-glow-out add" cx="160" cy="160" r="80.5" fill="none" stroke-width="2.4" filter="url(#b4)" />
          <!-- reflejo especular principal -->
          <ellipse cx="131" cy="110" rx="27" ry="15" fill="rgba(255,255,255,.32)" transform="rotate(-33 131 110)" filter="url(#b6)" />
          <ellipse cx="124" cy="103" rx="10" ry="5.5" fill="rgba(255,255,255,.75)" transform="rotate(-33 124 103)" filter="url(#b2)" />
          <circle cx="117" cy="97" r="1.6" fill="#ffffff" filter="url(#b1)" />
          <!-- brillo secundario de rebote, abajo-derecha -->
          <ellipse class="rim-bounce add" cx="196" cy="216" rx="14" ry="6" transform="rotate(-36 196 216)" filter="url(#b4)" />
          <!-- arco de luz en la base del cristal -->
          <path class="rim-base-arc add" d="M103,207 A79,79 0 0 0 192,232" fill="none" stroke-width="2.4" stroke-linecap="round" filter="url(#b2)" />
        </g>

        <!-- ═══ chispas de "descubriendo" ═══ -->
        <g class="fx fx-discovering">
          <g transform="translate(126,134) scale(.5)"><use href="#star4" class="spk" /></g>
          <g transform="translate(196,142) scale(.42)"><use href="#star4" class="spk s2" /></g>
          <g transform="translate(150,196) scale(.38)"><use href="#star4" class="spk s3" /></g>
          <g transform="translate(184,182) scale(.55)"><use href="#star4" class="spk s4" /></g>
        </g>

        <!-- ═══ anillo punteado de "pensando" ═══ -->
        <g class="fx fx-thinking">
          <circle class="think-ring" cx="160" cy="160" r="66" />
        </g>

        <!-- ═══ satélites: halo de gradiente + núcleo caliente ═══ -->
        <g transform="rotate(-16 160 160)">
          <g class="sat" style="--dur:9s; --delay:0s; offset-path: path('M290,160 A130,42 0 1 1 30,160 A130,42 0 1 1 290,160')">
            <circle r="11" fill="url(#satHaloGold)" class="add" />
            <circle r="3" fill="#fff6d8" />
          </g>
          <g class="sat" style="--dur:9s; --delay:-4.2s; offset-path: path('M290,160 A130,42 0 1 1 30,160 A130,42 0 1 1 290,160')">
            <circle r="6.5" fill="url(#satHaloGold)" class="add" />
            <circle r="1.8" fill="#fff6d8" />
          </g>
        </g>
        <g transform="rotate(22 160 160)">
          <g class="sat" style="--dur:12.5s; --delay:-2s; offset-path: path('M278,160 A118,54 0 1 1 42,160 A118,54 0 1 1 278,160')">
            <circle r="10" fill="url(#satHaloCyan)" class="add" />
            <circle r="2.8" fill="#eefbff" />
          </g>
          <g class="sat" style="--dur:12.5s; --delay:-8.5s; offset-path: path('M278,160 A118,54 0 1 1 42,160 A118,54 0 1 1 278,160')">
            <circle r="6" fill="url(#satHaloCyan)" class="add" />
            <circle r="1.7" fill="#eefbff" />
          </g>
        </g>
        <g transform="rotate(-38 160 160)">
          <g class="sat" style="--dur:16s; --delay:-6s; offset-path: path('M302,160 A142,30 0 1 1 18,160 A142,30 0 1 1 302,160')">
            <circle r="9" fill="url(#satHaloViolet)" class="add" />
            <circle r="2.5" fill="#f2ecff" />
          </g>
          <g class="sat" style="--dur:16s; --delay:-12s; offset-path: path('M302,160 A142,30 0 1 1 18,160 A142,30 0 1 1 302,160')">
            <circle r="5.5" fill="url(#satHaloGold)" class="add" />
            <circle r="1.6" fill="#fff6d8" />
          </g>
        </g>

        <!-- ═══ anillo de carga ═══ -->
        <g class="fx fx-loading">
          <circle class="load-track" cx="160" cy="160" r="98" />
          <g class="load-group">
            <circle class="load-arc-glow add" cx="160" cy="160" r="98" />
            <circle class="load-arc" cx="160" cy="160" r="98" />
            <circle class="load-head" cx="258" cy="160" r="3.6" />
          </g>
        </g>

        <!-- ═══ éxito ═══ -->
        <g class="fx fx-success">
          <circle class="succ-ring"    cx="160" cy="160" r="88" />
          <circle class="succ-ring r2" cx="160" cy="160" r="88" />
          <line class="succ-beam" x1="160" y1="120" x2="160" y2="52" />
          <g transform="translate(160,58) scale(.95)"><use href="#star4" class="succ-star" /></g>
        </g>

        <!-- ═══ notificación ═══ -->
        <g class="fx fx-notify">
          <circle class="noti-ripple" cx="160" cy="64" r="16" />
          <circle class="noti-halo add" cx="160" cy="64" r="17" fill="url(#satHaloGold)" />
          <g transform="translate(160,64) scale(.8)"><use href="#star4" class="noti-star" /></g>
        </g>

        <!-- ═══ celebración (generada por JS) ═══ -->
        <g class="fx fx-celebrating" id="partyLayer"></g>

        <!-- ═══ durmiendo ═══ -->
        <g class="fx fx-sleeping">
          <path class="moon" d="M216,84 a13,13 0 1 0 10,21 a10.5,10.5 0 1 1 -10,-21 Z" />
        </g>

      </g>

      <circle class="close-flash"    cx="160" cy="160" r="70" />
      <circle class="close-flash c2" cx="160" cy="160" r="70" />
    </svg>

    <div class="statedesc" id="statedesc"></div>
    <div class="statename" id="statename">Reposo</div>
  </div>

  <div class="controls" id="controls"></div>
  <div class="vaultbar" id="vaultbar">
    <span class="lbl">Color del vault:</span>
  </div>
  <div class="meta">
    <button id="btnTour">▶ Recorrido automático</button>
    <button id="btnBg">Fondo claro</button>
    <button id="btnSize">Tamaño: grande</button>
  </div>

<script>
  const NS = 'http://www.w3.org/2000/svg';

  /* ---------- campo de estrellas interior ---------- */
  (function buildStarfield() {
    let s = 42;
    const rnd = () => (s = (s * 16807) % 2147483647) / 2147483647;
    const g = document.getElementById('starfield');
    const cx = 160, cy = 160, R = 76;
    for (let i = 0; i < 90; i++) {
      const a = rnd() * Math.PI * 2;
      const rr = Math.sqrt(rnd()) * R;
      const x = cx + Math.cos(a) * rr;
      const y = cy + Math.sin(a) * rr;
      const size = 0.3 + rnd() * 1.1;
      const c = document.createElementNS(NS, 'circle');
      c.setAttribute('cx', x.toFixed(1)); c.setAttribute('cy', y.toFixed(1));
      c.setAttribute('r', size.toFixed(2));
      const warm = rnd() < 0.16;
      c.setAttribute('fill', warm ? 'rgba(255,233,168,.9)' : 'rgba(226,240,255,.9)');
      c.setAttribute('opacity', (0.2 + rnd() * 0.7).toFixed(2));
      if (rnd() < 0.28) { c.setAttribute('class', 'star-tw'); c.style.animationDelay = (rnd() * 4).toFixed(2) + 's'; }
      if (size > 1.15) c.setAttribute('filter', 'url(#b1)');
      g.appendChild(c);
    }
  })();

  /* ---------- constelación: fibonacci-sphere proyectada (mismo algoritmo
     que Nodi.tsx buildMesh); colores tematizados vía clases CSS ---------- */
  (function buildMesh() {
    const cx = 160, cy = 160, R = 54, N = 50;
    const pts = [];
    for (let i = 0; i < N; i++) {
      const y = 1 - (i / (N - 1)) * 2;
      const rr = Math.sqrt(Math.max(0, 1 - y * y));
      const th = i * 2.399963229;
      pts.push({ x: cx + Math.cos(th) * rr * R, y: cy - y * R, z: Math.sin(th) * rr });
    }
    const g = document.getElementById('mesh');
    const done = new Set();
    for (let a = 0; a < N; a++) {
      const order = pts.map((_, b) => b).filter((b) => b !== a)
        .map((b) => ({ b, d: Math.hypot(pts[a].x - pts[b].x, pts[a].y - pts[b].y) }))
        .sort((p, q) => p.d - q.d);
      for (let k = 0; k < 3; k++) {
        const { b, d } = order[k];
        if (d > R * 0.82) continue;
        const key = Math.min(a, b) + '_' + Math.max(a, b);
        if (done.has(key)) continue;
        done.add(key);
        const depth = ((pts[a].z + pts[b].z) / 2 + 1) / 2;
        const ln = document.createElementNS(NS, 'line');
        ln.setAttribute('x1', pts[a].x.toFixed(1)); ln.setAttribute('y1', pts[a].y.toFixed(1));
        ln.setAttribute('x2', pts[b].x.toFixed(1)); ln.setAttribute('y2', pts[b].y.toFixed(1));
        ln.setAttribute('class', 'mln');
        ln.setAttribute('stroke-opacity', (0.05 + depth * 0.18).toFixed(2));
        ln.setAttribute('stroke-width', (0.35 + depth * 0.35).toFixed(2));
        g.appendChild(ln);
      }
    }
    // nodos: puntos de luz; unos pocos acentos tematizados con halo real
    const accents = { 7: ['n-v', 3.2], 19: ['n-c', 2.8], 31: ['n-v', 2.3], 43: ['n-g', 2.5] };
    pts.forEach((p, i) => {
      const depth = (p.z + 1) / 2;
      if (accents[i]) {
        const halo = document.createElementNS(NS, 'circle');
        halo.setAttribute('cx', p.x.toFixed(1)); halo.setAttribute('cy', p.y.toFixed(1));
        halo.setAttribute('r', (accents[i][1] * 3.2).toFixed(1));
        halo.setAttribute('class', accents[i][0] + ' add');
        halo.setAttribute('opacity', '.28');
        halo.setAttribute('filter', 'url(#b4)');
        g.appendChild(halo);
        const c = document.createElementNS(NS, 'circle');
        c.setAttribute('cx', p.x.toFixed(1)); c.setAttribute('cy', p.y.toFixed(1));
        c.setAttribute('r', accents[i][1]);
        c.setAttribute('class', accents[i][0] + ' accent');
        c.style.animationDelay = (i * 0.13) + 's';
        g.appendChild(c);
      } else {
        const c = document.createElementNS(NS, 'circle');
        c.setAttribute('cx', p.x.toFixed(1)); c.setAttribute('cy', p.y.toFixed(1));
        c.setAttribute('r', (0.7 + depth * 0.8).toFixed(2));
        c.setAttribute('fill', 'rgba(226,242,255,' + (0.3 + depth * 0.55).toFixed(2) + ')');
        if (i % 5 === 0) { c.setAttribute('class', 'tw'); c.style.animationDelay = (i * 0.21) + 's'; }
        g.appendChild(c);
      }
    });
  })();

  /* ---------- polvo dorado flotante ---------- */
  (function buildDust() {
    let s = 7;
    const rnd = () => (s = (s * 16807) % 2147483647) / 2147483647;
    const g = document.getElementById('dustLayer');
    for (let i = 0; i < 14; i++) {
      const a = rnd() * Math.PI * 2;
      const dist = 95 + rnd() * 55;
      const x = 160 + Math.cos(a) * dist;
      const y = 160 + Math.sin(a) * dist * 0.8;
      const c = document.createElementNS(NS, 'circle');
      c.setAttribute('cx', x.toFixed(1)); c.setAttribute('cy', y.toFixed(1));
      c.setAttribute('r', (0.6 + rnd() * 1).toFixed(2));
      c.setAttribute('fill', rnd() < 0.6 ? 'rgba(255,233,168,.9)' : 'rgba(190,235,255,.85)');
      c.setAttribute('class', 'dust');
      c.style.animationDelay = (rnd() * 5).toFixed(2) + 's';
      c.style.animationDuration = (3.5 + rnd() * 4).toFixed(2) + 's';
      g.appendChild(c);
    }
  })();

  /* ---------- partículas de celebración (colores tematizados: .pc0-.pc5) ---------- */
  (function buildParty() {
    const layer = document.getElementById('partyLayer');
    for (let i = 0; i < 22; i++) {
      const ang = (i / 22) * Math.PI * 2 + (i % 3) * 0.31;
      const dist = 92 + (i % 5) * 16;
      const px = Math.cos(ang) * dist;
      const py = Math.sin(ang) * dist * 0.82 - 14;
      // el translate fijo va en un <g> contenedor: la animación CSS del
      // .party reemplazaría un transform puesto en el propio elemento
      let el, holder, k = 1;
      if (i % 4 === 0) {
        el = document.createElementNS(NS, 'use');
        el.setAttribute('href', '#star4');
        const sc = 0.22 + (i % 3) * 0.1;
        k = 1 / sc;
        holder = document.createElementNS(NS, 'g');
        holder.setAttribute('transform', 'translate(160,160) scale(' + sc.toFixed(2) + ')');
        holder.appendChild(el);
      } else {
        el = document.createElementNS(NS, 'circle');
        el.setAttribute('cx', 160); el.setAttribute('cy', 160);
        el.setAttribute('r', (1.6 + (i % 3)).toFixed(1));
        holder = el;
      }
      el.setAttribute('class', 'party pc' + (i % 6));
      el.style.setProperty('--px', (px * k).toFixed(0) + 'px');
      el.style.setProperty('--py', (py * k).toFixed(0) + 'px');
      el.style.setProperty('--pd', ((i % 7) * 0.13).toFixed(2) + 's');
      layer.appendChild(holder);
    }
  })();

  /* ---------- controles de estado ---------- */
  const STATES = [
    ['idle',        'Reposo',       'Flotación suave, órbitas lentas, pulso del núcleo.'],
    ['waving',      'Saludando',    'Balanceo alegre y reflejo que recorre el cristal.'],
    ['thinking',    'Pensando',     'La galaxia se acelera, anillo punteado girando.'],
    ['connecting',  'Conectando',   'Pulsos de luz recorren los enlaces de la red interior.'],
    ['discovering', 'Descubriendo', 'Chispas doradas: nuevas ideas encendiéndose.'],
    ['loading',     'Cargando',     'Anillo de progreso, barrido de energía circular.'],
    ['success',     'Éxito',        'Expansión armónica, destello ascendente, brillo positivo.'],
    ['celebrating', 'Celebración',  'Explosión de partículas, órbitas enérgicas y alegres.'],
    ['sleeping',    'Durmiendo',    'Todo se atenúa y ralentiza; respiración lenta del núcleo.'],
    ['closing',     'Cerrando',     'Destello y colapso del orbe (se reproduce una vez).'],
  ];
  const orb = document.getElementById('orb');
  const controls = document.getElementById('controls');
  const nameEl = document.getElementById('statename');
  const descEl = document.getElementById('statedesc');
  const buttons = {};

  function setState(s) {
    orb.dataset.state = s;
    const meta = STATES.find((x) => x[0] === s);
    nameEl.textContent = meta[1] + (orb.classList.contains('notify') ? ' + notificación' : '');
    descEl.textContent = meta[2];
    Object.entries(buttons).forEach(([k, b]) => b.classList.toggle('on', k === s));
    if (s === 'closing') {
      clearTimeout(setState._t);
      setState._t = setTimeout(() => { if (orb.dataset.state === 'closing') setState('idle'); }, 2600);
    }
  }

  STATES.forEach(([key, label]) => {
    const b = document.createElement('button');
    b.textContent = label;
    b.onclick = () => { stopTour(); setState(key); };
    buttons[key] = b;
    controls.appendChild(b);
  });

  // notificación: capa combinable con cualquier estado (equivale al brazo alzado)
  const bNoti = document.createElement('button');
  bNoti.textContent = 'Notificación';
  bNoti.className = 'toggle';
  bNoti.onclick = () => {
    orb.classList.toggle('notify');
    bNoti.classList.toggle('on', orb.classList.contains('notify'));
    setState(orb.dataset.state);
  };
  controls.appendChild(bNoti);

  /* ---------- temas por vault (colores oficiales de VaultSwitcher.tsx) ---------- */
  const VAULT_THEMES = [
    ['nodi',          'Nodi (azul)',     '#4d9be8'],
    ['academic',      'Académico',       '#6366f1'],
    ['estudio',       'Estudio',         '#0f766e'],
    ['genealogy',     'Genealogía',      '#ca8a04'],
    ['databases',     'Bases de datos',  '#b30333'],
    ['testimonios',   'Testimonios',     '#0891b2'],
    ['worldbuilding', 'Worldbuilding',   '#7c3aed'],
    ['docencia',      'Docencia',        '#ea580c'],
  ];

  function hueOf(hex) {
    const n = parseInt(hex.slice(1), 16);
    const r = ((n >> 16) & 255) / 255, g = ((n >> 8) & 255) / 255, b = (n & 255) / 255;
    const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
    if (mx === mn) return 0;
    const d = mx - mn;
    let h;
    if (mx === r) h = ((g - b) / d + 6) % 6;
    else if (mx === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    return Math.round(h * 60) % 360;
  }
  function hslToRgb(h, s, l) {
    const a = s * Math.min(l, 1 - l);
    const f = (n) => {
      const k = (n + h / 30) % 12;
      return l - a * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1)));
    };
    return [f(0), f(8), f(4)];
  }

  const vaultbar = document.getElementById('vaultbar');
  const swName = document.createElement('span');
  swName.className = 'swname';
  const swButtons = {};

  function setTheme(id) {
    const t = VAULT_THEMES.find((x) => x[0] === id);
    const hue = hueOf(t[2]);
    orb.style.setProperty('--h', hue + 'deg');
    // tinte de la textura de nubes (feColorMatrix no admite variables CSS)
    const [r, g, b] = hslToRgb((hue + 7) % 360, 1, 0.72);
    document.getElementById('cloudTint').setAttribute('values',
      '0 0 0 0 ' + r.toFixed(3) +
      ' 0 0 0 0 ' + g.toFixed(3) +
      ' 0 0 0 0 ' + b.toFixed(3) +
      ' 0.35 0.35 0.35 0 -0.18');
    swName.textContent = t[1];
    Object.entries(swButtons).forEach(([k, btn]) => btn.classList.toggle('on', k === id));
  }

  VAULT_THEMES.forEach(([id, name, hex]) => {
    const b = document.createElement('button');
    b.className = 'sw';
    b.style.background = hex;
    b.title = name;
    b.setAttribute('aria-label', name);
    b.onclick = () => setTheme(id);
    swButtons[id] = b;
    vaultbar.appendChild(b);
  });
  vaultbar.appendChild(swName);

  /* ---------- recorrido automático ---------- */
  let tourTimer = null, tourIdx = 0;
  const btnTour = document.getElementById('btnTour');
  function stopTour() {
    if (tourTimer) { clearInterval(tourTimer); tourTimer = null; btnTour.textContent = '▶ Recorrido automático'; }
  }
  btnTour.onclick = () => {
    if (tourTimer) { stopTour(); return; }
    btnTour.textContent = '⏸ Detener recorrido';
    tourIdx = 0;
    setState(STATES[0][0]);
    tourTimer = setInterval(() => {
      tourIdx = (tourIdx + 1) % (STATES.length - 1); // omite "closing" en el bucle
      setState(STATES[tourIdx][0]);
    }, 3600);
  };

  /* ---------- fondo y tamaño ---------- */
  const stage = document.getElementById('stage');
  const btnBg = document.getElementById('btnBg');
  btnBg.onclick = () => {
    stage.classList.toggle('light');
    btnBg.textContent = stage.classList.contains('light') ? 'Fondo oscuro' : 'Fondo claro';
  };
  const sizes = [['grande', '380px'], ['mediano', '250px'], ['pequeño', '150px']];
  let sizeIdx = 0;
  const btnSize = document.getElementById('btnSize');
  btnSize.onclick = () => {
    sizeIdx = (sizeIdx + 1) % sizes.length;
    orb.style.setProperty('--size', sizes[sizeIdx][1]);
    btnSize.textContent = 'Tamaño: ' + sizes[sizeIdx][0];
  };

  setTheme('nodi');
  setState('idle');
</script>
</body>
</html>
